<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
        }
        html {
            background-color: black;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            margin: 0;
        }
        #overlay-container {
            position: fixed;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background-color: black;
            color: rgba(0,255,0,1);
            font-weight: 700;
            text-align: right;
            padding-top: 4px;
            padding-bottom: 4px;
            padding-right: 4px;
            font-size: 12px;
            z-index: 200;
        }
        #ui-container {
            display: grid;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            padding-bottom: 24px;
            user-select: none;
        }
        #map-container {
            position: relative;
            display: inline-block;
            clear: both;
            overflow: scroll;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
            grid-row: 2;
        }
        
        #map {
            max-width: none;
            display: block;
            position: relative;
            z-index: 10;
            /* transform: rotate(-41deg); */
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
        }
        #sidebar {
            height: 100%;
            width: 100%;
            background-color: black;
            overflow: hidden;
            grid-row: 1
        }
        .marker {
            position: absolute;
            width: 20px;
            height: 20px;
            cursor: pointer;
            top: 0
        }
        .marker:hover .marker-circle {
            background-color: rgba(170,170,170,1);
        }
        .marker.selected .marker-circle {
            border: 2px solid rgba(255,255,255,1);
            background-color: rgba(80,155,80,1) !important;
            cursor: default
        }
        #sidebar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #scale-controls {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 4px;
            padding: 4px 0;
        }
        .scale-control {
            cursor: pointer;
            border: 1px solid rgba(0,200,0,1);
            padding: 2px;
            font-size: 10px;
        }
        .scale-control.selected {
            background-color: rgba(0,255,0,0.3);
        }
        .marker-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: rgba(100,100,100,1);
            border: 2px solid rgba(255,255,255,1);
            transform: scale(0.8);
            z-index: 3;
        }
        .marker-direction {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform: scale(0.75);
            border-top-left-radius: 100%;
            background-color: black;
            pointer-events: none;
            border-bottom: 2px solid rgba(255,255,255,1);
            border-right: 2px solid rgba(255,255,255,1);
        }

        @media only screen and (min-width: 768px) {
            #ui-container {
                grid-template-rows: none;
                grid-template-columns: 1fr 1fr;
            }
            #map-container {
                grid-row: unset;
            }
            #sidebar {
                grid-row: unset;
            }
        }
    </style>
</head>

        { name: '', x: 872, y: 2247, direction: 230, image: 'https://upload.wikimedia.org/wikipedia/commons/5/57/Biera%C5%9Bciejskaja_fartecyja._%D0%91%D0%B5%D1%80%D0%B0%D1%81%D1%8C%D1%86%D0%B5%D0%B9%D1%81%D0%BA%D0%B0%D1%8F_%D1%84%D0%B0%D1%80%D1%82%D1%8D%D1%86%D1%8B%D1%8F_%281916%29.jpg'},
        { name: '', x: 844, y: 1942, direction: 120, image: 'https://upload.wikimedia.org/wikipedia/commons/f/fa/Das_Wohnviertel_der_verschiedenen_Delegationen_in_Brest-Litowsk._-_LABW_-_Generallandesarchiv_Karlsruhe_F-S_Wochenschau_Nr._73.jpg'},

    ]

    let scale = 2
    let overlayEl = null
    let mapEl = null
    let mapContainerEl = null
    let mouseCoordsEl = null
    let canvasEl = null
    let sidebarEl = null
    let markers = []
    let isDragging = false

    const queryString = window.location.search
    const urlParams = new URLSearchParams(queryString)
    let currentMarker = urlParams.get('marker') ?? 0 
    
    function selectArea(id) {
        currentMarker = id
        const urlParams = new URLSearchParams(window.location.search)
        urlParams.set('marker', id)
        const newUrl = `${window.location.pathname}?${urlParams.toString()}`
        window.history.pushState({ path: newUrl }, '', newUrl)
        const area = areas[id]
        const el = document.querySelector(`.marker[data-area="${id}"]`)
        sidebarEl.innerHTML = `<img title="${area.name}" src="${area.image}">`
        for (const m of markers) {
            m.classList.remove('selected')
        }
        el.classList.add('selected')
    }

    function setScale(value) {
        scale = value
        document.querySelectorAll('.scale-control').forEach(i => i.classList.remove('selected'))
        document.querySelector(`.scale-control[data-scale="${value}"]`).classList.add('selected')
    }

    function initMap() {
        const w = mapEl.naturalWidth * scale
        const h = mapEl.naturalHeight * scale
        const renderedWidth = w + 'px'
        const renderedHeight = h + 'px'

        mapEl.style.width = renderedWidth
        mapEl.style.height = renderedHeight
        canvasEl.style.width = renderedWidth
        canvasEl.style.height = renderedHeight

        canvasEl.innerHTML = null
        markers = []

        for (const [index, area] of areas.entries()) {
            const el = document.createElement('div')
            el.classList.add('marker')
            el.title = area.name
            el.style.left = (area.x * scale) + 'px'
            el.style.top = (area.y * scale) + 'px'
            el.style.transform = `translate(-50%,-50%) rotate(${(area.direction - 135)}deg)`
            el.addEventListener('click', (event) => {
                event.stopPropagation()
                selectArea(index)
            })
            el.dataset.area = index
            el.innerHTML = `
                <div class="marker-circle"></div>
                ${(area.direction != null) ? `<div class="marker-direction"></div>` : ``}
            `
            if (currentMarker == index) {
                el.classList.add('selected')
            }
            markers.push(el)
            canvasEl.appendChild(el)
        }
        document.querySelector(`.marker[data-area="${currentMarker}"]`).scrollIntoView({ block: "center", inline: "center" })
    }

    window.addEventListener('load', () => {
        mapEl = document.querySelector('#map')
        mapContainerEl = document.querySelector('#map-container')
        overlayEl = document.querySelector('#overlay')
        canvasEl = document.querySelector('#canvas')
        sidebarEl = document.querySelector('#sidebar')
        mouseCoordsEl = document.querySelector('#mouse-coords')
        document.querySelectorAll('.scale-control').forEach(i => {
            i.addEventListener('click', () => { setScale(i.dataset.scale); initMap() })
        })

        mapContainerEl.addEventListener('mousemove', (event) => {
            const rect = mapEl.getBoundingClientRect()
            const x = event.clientX - rect.left - mapEl.clientLeft + mapEl.scrollLeft
            const y = event.clientY - rect.top - mapEl.clientTop + mapEl.scrollTop
            mouseCoordsEl.innerHTML = `X: ${Math.round(x / scale)} / Y: ${Math.round(y / scale)}`
        })
        mapContainerEl.addEventListener('click', (event) => {
            if (event.ctrlKey) {
                const rect = mapEl.getBoundingClientRect()
                const x = event.clientX - rect.left - mapEl.clientLeft + mapEl.scrollLeft
                const y = event.clientY - rect.top - mapEl.clientTop + mapEl.scrollTop
                const clipboard = `x: ${Math.round(x / scale)}, y: ${Math.round(y / scale)}`
                navigator.clipboard.writeText(clipboard)
                window.alert(`Координаты мыши скопированы в буфер обмена.\n${clipboard}`)
            }
        })
        mapContainerEl.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return
            isDragging = true
            mapContainerEl.style.cursor = 'grabbing'
        })

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return
            e.preventDefault()
            mapContainerEl.scrollLeft -= e.movementX
            mapContainerEl.scrollTop -= e.movementY
        })

        window.addEventListener('mouseup', () => {
            if (!isDragging) return
            isDragging = false
            mapContainerEl.style.cursor = 'grab'
        })

        mapContainerEl.style.cursor = 'grab'

        setScale(2)
        initMap()
        selectArea(currentMarker)
    })
</script>
